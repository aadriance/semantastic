<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{ .Title }} - Semantastic CSS</title>
<link rel="icon" href="{{ "favicon.ico" | relURL }}" />

<!-- Core CSS - always included -->
<link rel="stylesheet" href="{{ "css/tokens.css" | relURL }}" />
<link rel="stylesheet" href="{{ "css/colors.css" | relURL }}" />
<link rel="stylesheet" href="{{ "css/layout.css" | relURL }}" />
<link rel="stylesheet" href="{{ "css/components.css" | relURL }}" />
<link rel="stylesheet" href="{{ "css/candy.css" | relURL }}" />

<!-- Docs CSS - always included -->
<link rel="stylesheet" href="{{ "css/docs.css" | relURL }}" />

<!-- Page-specific inline styles -->
{{ if .Params.inlineStyles }}
<style>
  {
      {
      .Params.inlineStyles | safeCSS
    }
  }
</style>
{{ end }}
